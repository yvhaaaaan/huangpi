spring:
  application:
    name: huangpi-backend
  datasource:
    url: jdbc:h2:file:./data/huangpi;MODE=MySQL;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-this-secret-key-at-least-32-bytes}
    expiration: 7d
  storage:
    directory: ${STORAGE_DIRECTORY:./uploads}
    public-base-url: ${PUBLIC_BASE_URL:http://localhost:8080}
  wechat:
    mock-enabled: ${WECHAT_MOCK_ENABLED:true}
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
